<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поиск по фото</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .photo-container {
            max-width: 600px;
            margin: 60px auto;
            padding: 40px 30px;
            text-align: center;
        }

        .photo-container h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .photo-container p.subtitle {
            color: #666;
            margin-bottom: 30px;
        }

        /* Зона перетаскивания */
        .drop-zone {
            border: 2px dashed #aaa;
            border-radius: 16px;
            padding: 50px 20px;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            background: #fafafa;
            position: relative;
        }

        .drop-zone:hover,
        .drop-zone.dragover {
            border-color: #555;
            background: #f0f0f0;
        }

        .drop-zone input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        .drop-zone .icon {
            font-size: 3rem;
            margin-bottom: 12px;
        }

        .drop-zone .drop-text {
            font-size: 1rem;
            color: #555;
        }

        .drop-zone .drop-hint {
            font-size: 0.8rem;
            color: #999;
            margin-top: 6px;
        }

        /* Превью выбранного фото */
        #preview-wrap {
            display: none;
            margin-top: 20px;
        }

        #preview-wrap img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 12px;
            border: 1px solid #ddd;
            object-fit: contain;
        }

        #preview-wrap .preview-name {
            margin-top: 8px;
            font-size: 0.85rem;
            color: #666;
        }

        /* Кнопки */
        .btn-row {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 24px;
            flex-wrap: wrap;
        }

        .btn-search {
            background: #222;
            color: #fff;
            border: none;
            padding: 12px 32px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-search:hover {
            background: #444;
        }

        .btn-back {
            background: transparent;
            color: #555;
            border: 1px solid #ccc;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-back:hover {
            border-color: #888;
            color: #222;
        }

        /* Ошибка */
        .error-msg {
            background: #fff0f0;
            border: 1px solid #f5a5a5;
            color: #c0392b;
            padding: 12px 18px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        /* Загрузка */
        #loading {
            display: none;
            margin-top: 20px;
            color: #555;
            font-size: 0.95rem;
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid #ccc;
            border-top-color: #333;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="photo-container">
        <h1>🔍 Поиск по фото</h1>
        <p class="subtitle">Загрузите изображение — мы найдём похожие в интернете</p>

        {% if error %}
        <div class="error-msg">⚠️ {{ error }}</div>
        {% endif %}

        <form id="photoForm" method="POST" action="/photo" enctype="multipart/form-data">
            <div class="drop-zone" id="dropZone">
                <input type="file" name="photo" id="photoInput" accept="image/*">
                <div class="icon">📷</div>
                <div class="drop-text">Нажмите или перетащите фото сюда</div>
                <div class="drop-hint">PNG, JPG, JPEG, GIF, WEBP</div>
            </div>

            <div id="preview-wrap">
                <img id="previewImg" src="" alt="Превью">
                <div class="preview-name" id="previewName"></div>
            </div>

            <div class="btn-row">
                <button type="submit" class="btn-search" id="searchBtn" disabled>Найти похожие</button>
                <button type="button" class="btn-back" onclick="history.back()">← Назад</button>
            </div>
        </form>

        <div id="loading">
            <span class="spinner"></span> Загружаем изображение...
        </div>
    </div>

    <script>
        const input = document.getElementById('photoInput');
        const previewWrap = document.getElementById('preview-wrap');
        const previewImg = document.getElementById('previewImg');
        const previewName = document.getElementById('previewName');
        const searchBtn = document.getElementById('searchBtn');
        const dropZone = document.getElementById('dropZone');
        const form = document.getElementById('photoForm');
        const loading = document.getElementById('loading');

        input.addEventListener('change', () => showPreview(input.files[0]));

        // Drag & Drop
        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) {
                // Назначаем файл инпуту через DataTransfer
                const dt = new DataTransfer();
                dt.items.add(file);
                input.files = dt.files;
                showPreview(file);
            }
        });

        function showPreview(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                previewImg.src = e.target.result;
                previewName.textContent = file.name + ' (' + (file.size / 1024).toFixed(1) + ' КБ)';
                previewWrap.style.display = 'block';
                searchBtn.disabled = false;
            };
            reader.readAsDataURL(file);
        }

        form.addEventListener('submit', () => {
            searchBtn.disabled = true;
            loading.style.display = 'block';
        });
    </script>
</body>
</html>
